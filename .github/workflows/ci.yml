name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq libkrb5-dev

      - name: Lint
        run: |
          set -euo pipefail
          uv run ruff format --check .
          uv run ruff check .

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq libkrb5-dev

      - name: Typecheck
        run: |
          set -euo pipefail
          uv run ty check

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq libkrb5-dev

      - name: Test
        run: |
          set -euo pipefail
          uv run --python ${{ matrix.python-version }} pytest tests/ -q

  docs:
    name: Docs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq libkrb5-dev

      - name: Build docs
        run: |
          set -euo pipefail
          uv run --group docs mkdocs build --strict

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint, typecheck, test, docs]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq libkrb5-dev

      - name: Build wheel
        run: |
          set -euo pipefail
          uv build --wheel

  deploy-docs:
    name: Deploy Docs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint, typecheck, test, docs]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq libkrb5-dev

      - name: Build docs
        run: |
          set -euo pipefail
          uv run --group docs mkdocs build --strict

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site/

      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        id: deploy
